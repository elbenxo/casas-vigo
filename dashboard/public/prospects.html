<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prospectos — Casas Vigo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/dashboard/css/custom.css">
  <style>
    .kanban-board { scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }
    .kanban-board::-webkit-scrollbar { height: 6px; }
    .kanban-board::-webkit-scrollbar-track { background: transparent; }
    .kanban-board::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="nav"></div>

  <main class="lg:ml-56 p-6 pt-20 lg:pt-6">

    <!-- Header -->
    <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
      <div>
        <h2 class="text-2xl font-bold text-slate-800">Prospectos</h2>
        <p class="text-slate-500 text-sm mt-1">Pipeline de captacion de inquilinos</p>
      </div>
      <button onclick="openNewProspect()"
          class="flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
        </svg>
        Nuevo prospecto
      </button>
    </div>

    <!-- View toggle + filters -->
    <div class="flex flex-wrap items-end gap-3 mb-6">
      <!-- View toggle -->
      <div class="flex items-center bg-slate-100 rounded-lg p-1 gap-1">
        <button id="btn-view-kanban" onclick="switchView('kanban')"
            class="px-3 py-1.5 text-sm font-medium rounded-md transition-all bg-white shadow-sm text-slate-700">
          🗂 Kanban
        </button>
        <button id="btn-view-stats" onclick="switchView('stats')"
            class="px-3 py-1.5 text-sm font-medium rounded-md transition-all text-slate-400">
          📊 Estadisticas
        </button>
      </div>

      <!-- Filters -->
      <select id="filter-status" onchange="applyFilters()"
          class="border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
        <option value="">— Estado —</option>
        <option value="new">Nuevo</option>
        <option value="contacted">Contactado</option>
        <option value="visit_scheduled">Visita programada</option>
        <option value="visit_done">Visita hecha</option>
        <option value="contract_sent">Contrato enviado</option>
        <option value="signed">Firmado</option>
        <option value="lost">Perdido</option>
      </select>

      <select id="filter-channel" onchange="applyFilters()"
          class="border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
        <option value="">— Canal —</option>
        <option value="whatsapp">WhatsApp</option>
        <option value="telegram">Telegram</option>
        <option value="web">Web</option>
        <option value="idealista">Idealista</option>
        <option value="referral">Referido</option>
        <option value="other">Otro</option>
      </select>

      <select id="filter-flat" onchange="applyFilters()"
          class="border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
        <option value="">— Piso —</option>
      </select>
    </div>

    <!-- Kanban View -->
    <div id="view-kanban">
      <div id="kanban-board" class="kanban-board flex gap-4 overflow-x-auto pb-4"></div>
    </div>

    <!-- Stats View -->
    <div id="view-stats" class="hidden"></div>

  </main>

  <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

  <!-- ─── Modal: Mark as Lost ─────────────────────────────────────────────── -->
  <div id="modal-lost" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="modal-backdrop absolute inset-0" onclick="cerrarModal('modal-lost')"></div>
    <div class="bg-white rounded-xl shadow-xl w-full max-w-sm relative z-10 p-6">
      <h3 class="text-base font-semibold text-slate-800 mb-4">¿Por que se pierde?</h3>
      <div class="mb-4">
        <label class="block text-sm font-medium text-slate-700 mb-2">Motivo de perdida</label>
        <select id="loss-reason"
            class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500">
          <option value="price">Precio</option>
          <option value="location">Ubicacion</option>
          <option value="timing">Timing</option>
          <option value="other">Otro</option>
        </select>
      </div>
      <div class="flex justify-end gap-3">
        <button onclick="cerrarModal('modal-lost')"
            class="px-4 py-2 text-sm text-slate-600 hover:text-slate-800">Cancelar</button>
        <button onclick="confirmLost()"
            class="px-4 py-2 text-sm bg-red-600 text-white rounded-lg hover:bg-red-700 font-medium">Marcar perdido</button>
      </div>
    </div>
  </div>

  <!-- ─── Modal: Prospect Detail ──────────────────────────────────────────── -->
  <div id="modal-detail" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="modal-backdrop absolute inset-0" onclick="cerrarModal('modal-detail')"></div>
    <div class="bg-white rounded-xl shadow-xl w-full max-w-lg relative z-10 flex flex-col max-h-[90vh]">

      <!-- Header -->
      <div id="detail-header" class="p-6 border-b border-slate-100 flex-shrink-0"></div>

      <!-- Scrollable body -->
      <div class="overflow-y-auto flex-1 p-6 space-y-6">

        <!-- Info grid -->
        <div id="detail-info"></div>

        <!-- Interactions -->
        <div>
          <h4 class="text-sm font-semibold text-slate-700 mb-3">Historial de interacciones</h4>
          <div id="detail-interactions" class="space-y-1 max-h-48 overflow-y-auto"></div>
        </div>

        <!-- Add interaction -->
        <div class="bg-slate-50 rounded-lg p-4">
          <h4 class="text-sm font-semibold text-slate-700 mb-3">Registrar interaccion</h4>
          <div class="grid grid-cols-2 gap-3 mb-3">
            <div>
              <label class="block text-xs text-slate-500 mb-1">Tipo</label>
              <select id="add-int-type"
                  class="w-full border border-slate-300 rounded-lg px-2 py-1.5 text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="note">Nota</option>
                <option value="call">Llamada</option>
                <option value="whatsapp">WhatsApp</option>
                <option value="email">Email</option>
                <option value="visit">Visita</option>
                <option value="other">Otro</option>
              </select>
            </div>
            <div>
              <label class="block text-xs text-slate-500 mb-1">Direccion</label>
              <select id="add-int-direction"
                  class="w-full border border-slate-300 rounded-lg px-2 py-1.5 text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="outbound">Saliente (nosotros)</option>
                <option value="inbound">Entrante (prospecto)</option>
              </select>
            </div>
          </div>
          <textarea id="add-int-summary" rows="2" placeholder="Resumen de la interaccion..."
              class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500 resize-none mb-3"></textarea>
          <button onclick="submitInteraction()"
              class="w-full px-4 py-2 text-sm bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-medium transition-colors">
            Guardar interaccion
          </button>
        </div>

      </div>
    </div>
  </div>

  <!-- ─── Modal: New / Edit Prospect ──────────────────────────────────────── -->
  <div id="modal-edit-prospect" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="modal-backdrop absolute inset-0" onclick="cerrarModal('modal-edit-prospect')"></div>
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md relative z-10 p-6">
      <h3 id="edit-modal-title" class="text-lg font-semibold text-slate-800 mb-4">Nuevo prospecto</h3>
      <form id="form-edit-prospect" class="space-y-4">
        <input type="hidden" id="edit-id">

        <div class="grid grid-cols-2 gap-3">
          <div class="col-span-2">
            <label class="block text-sm font-medium text-slate-700 mb-1">Nombre <span class="text-red-500">*</span></label>
            <input type="text" id="edit-name" required placeholder="Nombre completo"
                class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Telefono</label>
            <input type="tel" id="edit-phone" placeholder="+34612345678"
                class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
            <input type="email" id="edit-email" placeholder="correo@ejemplo.com"
                class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Fecha nacimiento</label>
            <input type="date" id="edit-dob"
                class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">DNI / Pasaporte</label>
            <input type="text" id="edit-dni" placeholder="12345678X"
                class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Idioma</label>
            <select id="edit-lang"
                class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500">
              <option value="es">🇪🇸 Espanol</option>
              <option value="en">🇬🇧 English</option>
              <option value="gl">🏴 Galego</option>
              <option value="fr">🇫🇷 Francais</option>
              <option value="de">🇩🇪 Deutsch</option>
              <option value="ko">🇰🇷 Korean</option>
              <option value="pt">🇵🇹 Portugues</option>
              <option value="pl">🇵🇱 Polski</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Canal</label>
            <select id="edit-channel"
                class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500">
              <option value="whatsapp">📱 WhatsApp</option>
              <option value="telegram">✈️ Telegram</option>
              <option value="web">🌐 Web</option>
              <option value="idealista">🏠 Idealista</option>
              <option value="referral">👥 Referido</option>
              <option value="other">💬 Otro</option>
            </select>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Piso de interes</label>
            <select id="edit-flat" onchange="_onEditFlatChange(null)"
                class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500">
              <option value="">— Piso —</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Habitacion</label>
            <select id="edit-room"
                class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500">
              <option value="">— Habitacion —</option>
            </select>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Notas</label>
          <textarea id="edit-notes" rows="3" placeholder="Observaciones, preferencias, etc."
              class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500 resize-none"></textarea>
        </div>

        <div class="flex justify-end gap-3 pt-1">
          <button type="button" onclick="cerrarModal('modal-edit-prospect')"
              class="px-4 py-2 text-sm text-slate-600 hover:text-slate-800">Cancelar</button>
          <button type="submit"
              class="px-4 py-2 text-sm bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-medium">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/dashboard/js/app.js"></script>
  <script src="/dashboard/js/prospects.js"></script>
  <script>
    initNav('prospects');
    initProspects();
  </script>
</body>
</html>
