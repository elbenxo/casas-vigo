<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habitaciones — Casas Vigo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/dashboard/css/custom.css">
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="nav"></div>
  <main class="lg:ml-56 p-6 pt-20 lg:pt-6">
    <div class="mb-6 flex items-baseline justify-between">
      <div>
        <h2 class="text-2xl font-bold text-slate-800">Habitaciones</h2>
        <p class="text-slate-500 text-sm mt-1">Gestion de habitaciones por piso</p>
      </div>
      <button onclick="abrirNueva()" class="px-4 py-2 text-sm bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-medium flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        Nueva habitación
      </button>
    </div>
    <div id="content">
      <div class="flex items-center justify-center h-64 text-slate-400">Cargando...</div>
    </div>
  </main>

  <!-- Edit Modal -->
  <div id="modal-edit" class="hidden fixed inset-0 z-50 flex items-start justify-center p-4 overflow-y-auto">
    <div class="modal-backdrop absolute inset-0" onclick="cerrarModal('modal-edit')"></div>
    <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl relative z-10 my-8">
      <div class="flex items-center justify-between p-6 border-b border-slate-100">
        <h3 id="modal-title" class="text-lg font-semibold text-slate-800">Editar habitación</h3>
        <button onclick="cerrarModal('modal-edit')" class="text-slate-400 hover:text-slate-600">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <form id="form-edit" class="p-6 space-y-4">
        <input type="hidden" id="edit-id">

        <fieldset class="space-y-3">
          <legend class="text-sm font-semibold text-slate-700">Datos básicos</legend>
          <div class="grid sm:grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Piso</label>
              <select id="edit-flat" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none"></select>
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Slug interno</label>
              <input type="text" id="edit-slug" required placeholder="primavera" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm">
            </div>
          </div>
          <div class="grid sm:grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Nombre interno</label>
              <input type="text" id="edit-name" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm">
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Web ID (rooms list)</label>
              <input type="text" id="edit-web-id" placeholder="ir-primavera" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm">
            </div>
          </div>
        </fieldset>

        <fieldset class="space-y-3">
          <legend class="text-sm font-semibold text-slate-700">Precio y características</legend>
          <div class="grid sm:grid-cols-3 gap-3">
            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Precio mensual €</label>
              <input type="number" step="0.01" id="edit-price" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm">
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Precio noche €</label>
              <input type="number" step="0.01" id="edit-nightly" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm">
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Tamaño m²</label>
              <input type="number" step="0.1" id="edit-size" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm">
            </div>
          </div>
          <div class="grid sm:grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Tipo cama</label>
              <select id="edit-bed" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm">
                <option value="">—</option>
                <option value="individual">Individual</option>
                <option value="doble">Doble</option>
                <option value="2 individuales">2 individuales</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Disponible</label>
              <select id="edit-available" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm">
                <option value="1">Sí</option>
                <option value="0">No</option>
              </select>
            </div>
          </div>
          <div class="grid sm:grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Disponible desde</label>
              <input type="date" id="edit-from" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm">
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Nota</label>
              <input type="text" id="edit-note" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm">
            </div>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Features (separadas por comas)</label>
            <input type="text" id="edit-features" placeholder="Escritorio, Armario empotrado, Lámpara de araña" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm">
          </div>
        </fieldset>

        <fieldset class="border border-slate-200 rounded-lg p-4">
          <legend class="text-sm font-semibold text-slate-700 px-1">Nombre público (web)</legend>
          <div id="i18n-name" class="grid sm:grid-cols-2 gap-2"></div>
        </fieldset>

        <div class="flex justify-between items-center pt-4 border-t border-slate-100">
          <button type="button" id="btn-delete" onclick="eliminar()" class="px-3 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg font-medium">Eliminar</button>
          <div class="flex gap-3">
            <button type="button" onclick="cerrarModal('modal-edit')" class="px-4 py-2 text-sm text-slate-600 hover:text-slate-800">Cancelar</button>
            <button type="submit" class="px-4 py-2 text-sm bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-medium">Guardar</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

  <script src="/dashboard/js/app.js"></script>
  <script src="/dashboard/js/rooms.js"></script>
</body>
</html>
