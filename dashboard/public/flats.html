<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pisos — Casas Vigo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/dashboard/css/custom.css">
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="nav"></div>
  <main class="lg:ml-56 p-6 pt-20 lg:pt-6">
    <div class="mb-6 flex items-baseline justify-between">
      <div>
        <h2 class="text-2xl font-bold text-slate-800">Pisos</h2>
        <p class="text-slate-500 text-sm mt-1">Datos del piso y contenido público multilingüe</p>
      </div>
      <button onclick="abrirNuevo()" class="px-4 py-2 text-sm bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-medium flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        Nuevo piso
      </button>
    </div>

    <div id="content">
      <div class="flex items-center justify-center h-64 text-slate-400">Cargando...</div>
    </div>
  </main>

  <!-- Edit Modal -->
  <div id="modal-edit" class="hidden fixed inset-0 z-50 flex items-start justify-center p-4 overflow-y-auto">
    <div class="modal-backdrop absolute inset-0" onclick="cerrarModal('modal-edit')"></div>
    <div class="bg-white rounded-xl shadow-xl w-full max-w-3xl relative z-10 my-8">
      <div class="flex items-center justify-between p-6 border-b border-slate-100">
        <h3 id="modal-title" class="text-lg font-semibold text-slate-800">Editar piso</h3>
        <button onclick="cerrarModal('modal-edit')" class="text-slate-400 hover:text-slate-600">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <form id="form-edit" class="p-6 space-y-5">
        <input type="hidden" id="edit-id">

        <!-- Datos básicos -->
        <fieldset class="space-y-3">
          <legend class="text-sm font-semibold text-slate-700">Datos básicos</legend>
          <div class="grid sm:grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Slug interno (DB)</label>
              <input type="text" id="edit-slug" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Web slug (URL)</label>
              <input type="text" id="edit-web-slug" placeholder="alfonso-1-derecha" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
            </div>
          </div>
          <div class="grid sm:grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Web ID prefix (rooms)</label>
              <input type="text" id="edit-web-id-prefix" placeholder="1d" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Precio piso completo (€/mes, opcional)</label>
              <input type="number" step="0.01" id="edit-whole-price" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
            </div>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Nombre interno (admin)</label>
            <input type="text" id="edit-name" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Dirección</label>
            <input type="text" id="edit-address" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
          </div>
          <div class="grid sm:grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Latitud</label>
              <input type="number" step="any" id="edit-lat" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Longitud</label>
              <input type="number" step="any" id="edit-lng" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
            </div>
          </div>
          <label class="flex items-center gap-2 text-sm text-slate-700">
            <input type="checkbox" id="edit-tourist" class="w-4 h-4 text-indigo-600 rounded focus:ring-indigo-500">
            Licencia turística
          </label>
        </fieldset>

        <!-- Amenidades -->
        <fieldset>
          <legend class="text-sm font-semibold text-slate-700 mb-1">Amenidades</legend>
          <input type="text" id="edit-amenities" placeholder="WiFi fibra, Cocina equipada, Lavadora..." class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
          <p class="text-xs text-slate-400 mt-1">Separadas por comas</p>
        </fieldset>

        <!-- I18n: Nombre público -->
        <fieldset class="border border-slate-200 rounded-lg p-4">
          <legend class="text-sm font-semibold text-slate-700 px-1">Nombre público (web)</legend>
          <div id="i18n-name" class="grid sm:grid-cols-2 gap-2"></div>
        </fieldset>

        <!-- I18n: Barrio -->
        <fieldset class="border border-slate-200 rounded-lg p-4">
          <legend class="text-sm font-semibold text-slate-700 px-1">Barrio (web)</legend>
          <div id="i18n-neighborhood" class="grid sm:grid-cols-2 gap-2"></div>
        </fieldset>

        <!-- I18n: Descripción -->
        <fieldset class="border border-slate-200 rounded-lg p-4">
          <legend class="text-sm font-semibold text-slate-700 px-1">Descripción (web)</legend>
          <div id="i18n-description" class="space-y-2"></div>
        </fieldset>

        <!-- Reviews -->
        <fieldset class="border border-slate-200 rounded-lg p-4" id="reviews-section" style="display:none">
          <legend class="text-sm font-semibold text-slate-700 px-1">Reviews</legend>
          <div id="reviews-list" class="space-y-3 mb-3"></div>
          <button type="button" onclick="addReview()" class="text-sm text-indigo-600 hover:text-indigo-800 font-medium">+ Añadir review</button>
        </fieldset>

        <div class="flex justify-end gap-3 pt-4 border-t border-slate-100">
          <button type="button" onclick="cerrarModal('modal-edit')" class="px-4 py-2 text-sm text-slate-600 hover:text-slate-800">Cancelar</button>
          <button type="submit" class="px-4 py-2 text-sm bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-medium">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

  <script src="/dashboard/js/app.js"></script>
  <script src="/dashboard/js/flats.js"></script>
</body>
</html>
