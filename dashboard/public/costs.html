<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Costes — Casas Vigo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/dashboard/css/custom.css">
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="nav"></div>
  <main class="lg:ml-56 p-6 pt-20 lg:pt-6">
    <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
      <div>
        <h2 class="text-2xl font-bold text-slate-800">Costes</h2>
        <p class="text-slate-500 text-sm mt-1">Suministros, IBI, seguros, reparaciones</p>
      </div>
      <button onclick="abrirModal('modal-add')" class="flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 transition-colors">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg> Nuevo coste
      </button>
    </div>

    <!-- Filters -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-4 mb-6">
      <div class="grid grid-cols-2 sm:grid-cols-5 gap-3">
        <div>
          <label class="block text-xs text-slate-500 mb-1">Mes</label>
          <select id="f-mes" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500"></select>
        </div>
        <div>
          <label class="block text-xs text-slate-500 mb-1">Ano</label>
          <select id="f-ano" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500"></select>
        </div>
        <div>
          <label class="block text-xs text-slate-500 mb-1">Piso</label>
          <select id="f-piso" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500"></select>
        </div>
        <div>
          <label class="block text-xs text-slate-500 mb-1">Tipo</label>
          <select id="f-tipo" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500">
            <option value="">Todos</option>
          </select>
        </div>
        <div class="flex items-end">
          <button onclick="cargarCostes()" class="w-full px-4 py-2 bg-slate-100 text-slate-700 text-sm font-medium rounded-lg hover:bg-slate-200">Filtrar</button>
        </div>
      </div>
    </div>

    <!-- Summary -->
    <div id="resumen" class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-6"></div>

    <!-- Breakdown by type -->
    <div id="desglose" class="bg-white rounded-xl shadow-sm border border-slate-100 p-6 mb-6 hidden">
      <h3 class="text-sm font-semibold text-slate-700 mb-3">Desglose por tipo</h3>
      <div id="desglose-body" class="space-y-2"></div>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-slate-50 text-left text-xs text-slate-500 uppercase tracking-wider">
              <th class="px-4 py-3">Piso</th>
              <th class="px-4 py-3">Tipo</th>
              <th class="px-4 py-3">Descripcion</th>
              <th class="px-4 py-3">Importe</th>
              <th class="px-4 py-3">Periodo</th>
              <th class="px-4 py-3">Fecha</th>
            </tr>
          </thead>
          <tbody id="tabla"></tbody>
        </table>
      </div>
      <div id="tabla-empty" class="hidden text-center py-12 text-slate-400">Sin costes para este periodo</div>
    </div>
  </main>

  <!-- Add Modal -->
  <div id="modal-add" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="modal-backdrop absolute inset-0" onclick="cerrarModal('modal-add')"></div>
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md relative z-10 p-6">
      <h3 class="text-lg font-semibold text-slate-800 mb-4">Registrar coste</h3>
      <form id="form-add" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Piso</label>
          <select id="add-flat" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500"></select>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Tipo</label>
          <select id="add-type" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500"></select>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Descripcion</label>
          <input type="text" id="add-desc" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Factura Naturgy marzo...">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Importe (EUR)</label>
          <input type="number" id="add-amount" step="0.01" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Mes</label>
            <select id="add-month" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500"></select>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Ano</label>
            <select id="add-year" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500"></select>
          </div>
        </div>
        <div class="flex justify-end gap-3 pt-2">
          <button type="button" onclick="cerrarModal('modal-add')" class="px-4 py-2 text-sm text-slate-600 hover:text-slate-800">Cancelar</button>
          <button type="submit" class="px-4 py-2 text-sm bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-medium">Registrar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

  <script src="/dashboard/js/app.js"></script>
  <script>
    initNav('costs');

    let pisos = [], flatMap = {};

    async function init() {
      pisos = await api('/flats');
      flatMap = buildMap(pisos);

      llenarMes(el('f-mes'));
      llenarAno(el('f-ano'));
      llenarPisos(el('f-piso'), pisos);

      // Type filter
      const fTipo = el('f-tipo');
      Object.entries(TIPOS_COSTE).forEach(([k, v]) => {
        fTipo.innerHTML += `<option value="${k}">${v}</option>`;
      });

      // Form selects
      llenarPisos(el('add-flat'), pisos, false);
      const addType = el('add-type');
      addType.innerHTML = '<option value="">Seleccionar\u2026</option>';
      Object.entries(TIPOS_COSTE).forEach(([k, v]) => {
        addType.innerHTML += `<option value="${k}">${v}</option>`;
      });
      llenarMes(el('add-month'));
      llenarAno(el('add-year'));

      await cargarCostes();
    }

    async function cargarCostes() {
      const mes = el('f-mes').value;
      const ano = el('f-ano').value;
      const piso = el('f-piso').value;
      const tipo = el('f-tipo').value;
      let q = `?month=${mes}&year=${ano}`;
      if (piso) q += `&flat_id=${piso}`;
      if (tipo) q += `&type=${tipo}`;

      try {
        const costes = await api(`/costs${q}`);
        renderTabla(costes);
        renderResumen(costes);
        renderDesglose(costes);
      } catch (err) {
        notify(err.message, 'error');
      }
    }

    function renderResumen(costes) {
      const total = costes.reduce((s, c) => s + c.amount, 0);
      el('resumen').innerHTML = `
        <div class="stat-card bg-white rounded-xl p-5 shadow-sm border border-slate-100 col-span-2 sm:col-span-1">
          <p class="text-sm text-slate-500">Total periodo</p>
          <p class="text-2xl font-bold text-red-500 mt-1">${eur(total)}</p>
          <p class="text-xs text-slate-400 mt-1">${costes.length} registros</p>
        </div>
      `;
    }

    function renderDesglose(costes) {
      if (!costes.length) { el('desglose').classList.add('hidden'); return; }
      el('desglose').classList.remove('hidden');

      const byType = {};
      const total = costes.reduce((s, c) => s + c.amount, 0);
      costes.forEach(c => {
        byType[c.type] = (byType[c.type] || 0) + c.amount;
      });

      const colors = {
        agua: 'bg-blue-400', luz: 'bg-yellow-400', gas: 'bg-orange-400',
        internet: 'bg-purple-400', ibi: 'bg-slate-400', seguro: 'bg-teal-400',
        reparacion: 'bg-red-400', otro: 'bg-gray-400'
      };

      el('desglose-body').innerHTML = Object.entries(byType)
        .sort((a, b) => b[1] - a[1])
        .map(([type, amount]) => {
          const p = total ? Math.round((amount / total) * 100) : 0;
          return `
            <div class="flex items-center gap-3">
              <span class="text-sm text-slate-600 w-24">${TIPOS_COSTE[type] || type}</span>
              <div class="flex-1 bg-slate-100 rounded-full h-2">
                <div class="${colors[type] || 'bg-gray-400'} h-2 rounded-full" style="width:${p}%"></div>
              </div>
              <span class="text-sm font-medium text-slate-700 w-24 text-right">${eur(amount)}</span>
              <span class="text-xs text-slate-400 w-10 text-right">${p}%</span>
            </div>
          `;
        }).join('');
    }

    function renderTabla(costes) {
      if (!costes.length) {
        el('tabla').innerHTML = '';
        el('tabla-empty').classList.remove('hidden');
        return;
      }
      el('tabla-empty').classList.add('hidden');
      el('tabla').innerHTML = costes.map(c => {
        const flat = flatMap[c.flat_id];
        return `
          <tr class="table-row border-t border-slate-100">
            <td class="px-4 py-3 font-medium text-slate-800">${flat ? flat.name : '#' + c.flat_id}</td>
            <td class="px-4 py-3"><span class="badge bg-slate-100 text-slate-600">${TIPOS_COSTE[c.type] || c.type}</span></td>
            <td class="px-4 py-3 text-slate-500">${c.description || '\u2014'}</td>
            <td class="px-4 py-3 font-semibold text-red-500">${eur(c.amount)}</td>
            <td class="px-4 py-3 text-slate-500">${mesNombre(c.month)} ${c.year}</td>
            <td class="px-4 py-3 text-slate-400 text-xs">${fecha(c.created_at)}</td>
          </tr>
        `;
      }).join('');
    }

    el('form-add').addEventListener('submit', async (e) => {
      e.preventDefault();
      const body = {
        flat_id: parseInt(el('add-flat').value),
        type: el('add-type').value,
        description: el('add-desc').value || null,
        amount: parseFloat(el('add-amount').value),
        month: parseInt(el('add-month').value),
        year: parseInt(el('add-year').value),
      };
      try {
        await api('/costs', { method: 'POST', body });
        cerrarModal('modal-add');
        el('form-add').reset();
        llenarPisos(el('add-flat'), pisos, false);
        llenarMes(el('add-month'));
        llenarAno(el('add-year'));
        notify('Coste registrado');
        await cargarCostes();
      } catch (err) {
        notify(err.message, 'error');
      }
    });

    init();
  </script>
</body>
</html>
